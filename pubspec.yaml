name: foodie_app
description: A smooth Flutter food delivery app with Material 3 green theme.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase — pinned to compatible versions that work on Web + Mobile
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management
  provider: ^6.1.2

  # Utilities
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
